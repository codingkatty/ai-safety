<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title">content, wip</title>
    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
    <link rel="stylesheet" href="github-md.css">
    <style>
        body {
            background-color: #0d1117;
        }

        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
        }

        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0d1117;
            }
        }

        #he {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
        }

        #he h1 {
            color: #ffa4ac;
            font-size: 48px;
            margin-bottom: 0;
        }

        #he p {
            color: white;
            font-size: 18px;
        }

        #he a {
            color: white;
        }

        #somthin {
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
        }

        #somthin button {
            background-color: #ffa4ac;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #somthin button:hover {
            background-color: #ff8c9e;
        }
    </style>
</head>
<body>
    <header id="he">
        <a href="index.html">go back</a>
        <h1 id="titl">title</h1>
        <p id="whowrotethis">author: probably dian</p>
    </header>
    <article id="main-container" class="markdown-body"></article>
    <div id="somthin">
        <button onclick="nextPage()">next page</button>
    </div>
    <script src="renderpage.js"></script>
</body>
</html>
